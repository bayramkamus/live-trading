name: sync-to-hf-space

on:
  # daily-signals commit yaptığında tetikle
  push:
    branches: [main, master]
    paths:
      - "data_live/app.db"
      - "app/**"
      - "code/**"
  # elle tetikle
  workflow_dispatch:

concurrency:
  group: sync-hf-space
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: |
          pip install "huggingface_hub>=0.24"

      - name: Stage files for Space
        run: |
          set -e
          mkdir -p stage
          # app/ içeriği Space'in root'una gider
          cp -r app/* stage/
          # code/ ve data_live/app.db Space içinde ayrı klasörlere
          mkdir -p stage/code stage/data_live
          cp -r code/* stage/code/
          if [ -f data_live/app.db ]; then
            cp data_live/app.db stage/data_live/app.db
          fi
          # .gitattributes: DB'yi LFS'e yönlendir
          cat > stage/.gitattributes <<'EOF'
          *.db filter=lfs diff=lfs merge=lfs -text
          data_live/app.db filter=lfs diff=lfs merge=lfs -text
          EOF
          ls -la stage/ stage/code/ stage/data_live/

      - name: Upload to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER:  ${{ secrets.HF_USER }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -e
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USER" ] || [ -z "$HF_SPACE" ]; then
            echo "HF_TOKEN, HF_USER, HF_SPACE secrets eksik — atlıyorum"
            exit 0
          fi
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, CommitOperationAdd, CommitOperationDelete
          from pathlib import Path

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f"{os.environ['HF_USER']}/{os.environ['HF_SPACE']}"
          stage = Path("stage")

          # Space'teki mevcut dosyalar — staged set'te olmayanları sil
          try:
              remote_files = set(api.list_repo_files(repo_id=repo_id, repo_type="space"))
          except Exception:
              remote_files = set()

          local_files = {
              str(p.relative_to(stage)).replace("\\", "/")
              for p in stage.rglob("*") if p.is_file()
          }

          ops = []
          for rel in sorted(local_files):
              ops.append(CommitOperationAdd(
                  path_in_repo=rel,
                  path_or_fileobj=str(stage / rel),
              ))
          # README.md dışındaki farklı dosyaları sil (README hep güncellenir)
          for rel in sorted(remote_files - local_files):
              if rel.startswith(".gitattributes"):
                  continue
              ops.append(CommitOperationDelete(path_in_repo=rel))

          from datetime import datetime
          msg = f"sync from github: {datetime.utcnow().isoformat(timespec='minutes')}Z"
          api.create_commit(
              repo_id=repo_id,
              repo_type="space",
              operations=ops,
              commit_message=msg,
          )
          print(f"Pushed {len(local_files)} files, deleted {len(ops) - len(local_files)}")
          PY
